<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cisco CLI Learning App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #0f172a;
        color: #e2e8f0;
    }

    header {
        background: #1e293b;
        padding: 15px;
        text-align: center;
        font-size: 22px;
        font-weight: bold;
    }

    .container {
        display: flex;
        height: 100vh;
    }

    .sidebar {
        width: 300px;
        background: #111827;
        padding: 10px;
        overflow-y: auto;
        border-right: 1px solid #334155;
    }

    .search-box {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 5px;
        border: none;
    }

    .category {
        margin-top: 15px;
        font-size: 14px;
        color: #94a3b8;
    }

    .command {
        padding: 10px;
        margin: 5px 0;
        background: #1f2937;
        border-radius: 5px;
        cursor: pointer;
    }

    .command:hover {
        background: #334155;
    }

    .content {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
    }

    .box {
        background: #1e293b;
        padding: 20px;
        border-radius: 10px;
    }

    code {
        background: #0f172a;
        padding: 3px 6px;
        border-radius: 5px;
        color: #38bdf8;
    }

    h2 {
        color: #38bdf8;
    }
</style>
</head>

<body>

<header>Cisco CLI Learning Web App</header>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <input type="text" class="search-box" placeholder="Search CLI command..." onkeyup="searchCommands(this.value)">

        <div class="category">BASIC COMMANDS</div>
        <div class="command" onclick="showDetail('enable')">enable</div>
        <div class="command" onclick="showDetail('show ip')">show ip interface brief</div>
        <div class="command" onclick="showDetail('configure')">configure terminal</div>

        <div class="category">VLAN</div>
        <div class="command" onclick="showDetail('vlan')">create VLAN</div>
        <div class="command" onclick="showDetail('trunk')">switchport mode trunk</div>

        <div class="category">ROUTING</div>
        <div class="command" onclick="showDetail('routing')">ip routing</div>
        <div class="command" onclick="showDetail('static')">static route</div>

        <div class="category">SECURITY</div>
        <div class="command" onclick="showDetail('password')">enable secret</div>
    </div>

    <!-- Content -->
    <div class="content">
        <div class="box" id="output">
            <h2>Welcome 👋</h2>
            <p>Select a Cisco CLI command from the left menu to see details.</p>
        </div>
    </div>

</div>

<script>
const data = {
    "enable": {
        title: "ENABLE MODE",
        cmd: "enable",
        desc: "Used to enter privileged EXEC mode in Cisco devices.",
        example: "Router> enable",
        note: "Allows access to configuration commands."
    },

    "show ip": {
        title: "SHOW IP INTERFACE BRIEF",
        cmd: "show ip interface brief",
        desc: "Displays summary of all interfaces with IP addresses and status.",
        example: "Router# show ip interface brief",
        note: "Very useful for checking network status quickly."
    },

    "configure": {
        title: "CONFIGURE TERMINAL",
        cmd: "configure terminal",
        desc: "Enters global configuration mode.",
        example: "Router# configure terminal",
        note: "Used to configure device settings."
    },

    "vlan": {
        title: "CREATE VLAN",
        cmd: "vlan 10",
        desc: "Creates a VLAN on a switch.",
        example: "Switch(config)# vlan 10",
        note: "Used for network segmentation."
    },

    "trunk": {
        title: "TRUNK MODE",
        cmd: "switchport mode trunk",
        desc: "Sets interface as trunk port to carry multiple VLANs.",
        example: "Switch(config-if)# switchport mode trunk",
        note: "Used between switches."
    },

    "routing": {
        title: "IP ROUTING",
        cmd: "ip routing",
        desc: "Enables routing on Layer 3 switch.",
        example: "Switch(config)# ip routing",
        note: "Required for inter-VLAN routing."
    },

    "static": {
        title: "STATIC ROUTE",
        cmd: "ip route",
        desc: "Manually defines a route to a network.",
        example: "Router(config)# ip route 192.168.2.0 255.255.255.0 192.168.1.1",
        note: "Used when dynamic routing is not used."
    },

    "password": {
        title: "ENABLE SECRET",
        cmd: "enable secret",
        desc: "Sets encrypted password for privileged mode.",
        example: "Router(config)# enable secret mypassword",
        note: "More secure than 'enable password'."
    }
};

function showDetail(key) {
    const item = data[key];
    if (!item) return;

    document.getElementById("output").innerHTML = `
        <h2>${item.title}</h2>
        <p><b>Command:</b> <code>${item.cmd}</code></p>
        <p><b>Description:</b> ${item.desc}</p>
        <p><b>Example:</b> <code>${item.example}</code></p>
        <p><b>Note:</b> ${item.note}</p>
    `;
}

function searchCommands(value) {
    const commands = document.querySelectorAll(".command");
    value = value.toLowerCase();

    commands.forEach(cmd => {
        if (cmd.innerText.toLowerCase().includes(value)) {
            cmd.style.display = "block";
        } else {
            cmd.style.display = "none";
        }
    });
}
</script>

</body>
</html>
