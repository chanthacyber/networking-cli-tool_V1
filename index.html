<div class="bg-slate-950 border border-slate-800 rounded-xl p-6 max-w-[1600px] mx-auto my-6 w-full">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-slate-800 pb-5 mb-6">
        <div>
            <h2 class="text-xl font-bold text-slate-100 flex items-center gap-2">
                <i data-lucide="book-open" class="w-5 h-5 text-blue-400"></i> Multi-Vendor CLI Command Matrix
            </h2>
            <p class="text-xs text-slate-400 mt-1">Cross-platform command reference mapping and functional breakdowns.</p>
        </div>
        <div class="flex flex-wrap gap-2" id="vendorTabs">
            <button onclick="switchVendorTab('cisco')" id="tab-cisco" class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-blue-600 text-white transition-all cursor-pointer">Cisco IOS</button>
            <button onclick="switchVendorTab('juniper')" id="tab-juniper" class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-slate-900 border border-slate-800 text-slate-400 hover:text-slate-200 transition-all cursor-pointer">Juniper JunOS</button>
            <button onclick="switchVendorTab('arista')" id="tab-arista" class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-slate-900 border border-slate-800 text-slate-400 hover:text-slate-200 transition-all cursor-pointer">Arista EOS</button>
            <button onclick="switchVendorTab('fortinet')" id="tab-fortinet" class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-slate-900 border border-slate-800 text-slate-400 hover:text-slate-200 transition-all cursor-pointer">Fortinet FortiOS</button>
            <button onclick="switchVendorTab('paloalto')" id="tab-paloalto" class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-slate-900 border border-slate-800 text-slate-400 hover:text-slate-200 transition-all cursor-pointer">Palo Alto</button>
            <button onclick="switchVendorTab('hp')" id="tab-hp" class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-slate-900 border border-slate-800 text-slate-400 hover:text-slate-200 transition-all cursor-pointer">HP Comware</button>
        </div>
    </div>

    <div class="overflow-x-auto">
        <table class="w-full text-left text-sm text-slate-300">
            <thead class="bg-slate-900/80 text-slate-400 text-xs uppercase font-mono border-b border-slate-800">
                <tr>
                    <th class="p-4 w-1/4">Category</th>
                    <th class="p-4 w-1/3">Command Line Syntax</th>
                    <th class="p-4 w-5/12">Functional Explanation</th>
                </tr>
            </thead>
            <tbody id="vendorTableContent" class="divide-y divide-slate-900">
                </tbody>
        </table>
    </div>
</div>

<script>
    const vendorData = {
        cisco: [
            { cat: "Interface Status", cmd: "show ip interface brief", desc: "Provides a high-level summary of all layer-3 interfaces, their assigned IP addresses, operational status (Line Protocol), and physical link layer hardware states." },
            { cat: "System Telemetry", cmd: "show version", desc: "Displays hardware specs, device uptime, current IOS image file path string, system configuration register values, and motherboard boot diagnostics." },
            { cat: "Routing & Pathing", cmd: "show ip route", desc: "Outputs the complete local IP routing table database showing active static entries, dynamically learned paths (OSPF, BGP, EIGRP), administrative distance, and metric weights." },
            { cat: "VLAN Topology", cmd: "show vlan brief", desc: "Enumerates all configured virtual LAN software interfaces, their binding tracking IDs, port membership assignments, and structural administrative operational status." },
            { cat: "State Commitment", cmd: "copy running-config startup-config", desc: "Copies current transient running operational configuration space from RAM non-volatile memory directly to NVRAM to protect parameters during hard reboots." }
        ],
        juniper: [
            { cat: "Interface Status", cmd: "show interfaces terse", desc: "Presents a highly compacted system layout view of physical endpoints, logical interface tags, protocol families (inet, inet6, mpls), operational status, and addressing schema." },
            { cat: "System Telemetry", cmd: "show version", desc: "Displays the active software model kernel package distributions, JUNOS application bundle releases, and system component module architectures." },
            { cat: "Routing & Pathing", cmd: "show route", desc: "Interrogates the master Juniper routing engine database engine tables (inet.0, inet6.0) to present global paths alongside preference metrics." },
            { cat: "VLAN Topology", cmd: "show vlans", desc: "Lists configured switching domains, structural tagged/untagged port matrices, 802.1Q parameters, and active bridging instances." },
            { cat: "State Commitment", cmd: "commit", desc: "Validates, compiles, and shifts candidate pipeline parameters directly over to active execution memory context via automated transaction-level processing." }
        ],
        arista: [
            { cat: "Interface Status", cmd: "show ip interface brief", desc: "Standardized modern text dashboard summary displaying physical port state markers, line status, and local IP addresses assigned across routing interfaces." },
            { cat: "System Telemetry", cmd: "show version", desc: "Displays hardware profile details, operational EOS distribution build hashes, system flash size profiles, and module extension details." },
            { cat: "Routing & Pathing", cmd: "show ip route", desc: "Dumps the internal hardware forwarding engine table parameters, listing adjacent gateways, dynamic protocol origins, and metric weights." },
            { cat: "VLAN Topology", cmd: "show vlan", desc: "Generates bridging domain tables mapping virtual network containers against active physical edge and trunk configurations." },
            { cat: "State Commitment", cmd: "copy running-config startup-config", desc: "Synchronizes the current operational execution configuration parameters onto stable internal system boot storage modules." }
        ],
        fortinet: [
            { cat: "Interface Status", cmd: "get system interface physical", desc: "Presents a hardware-level view of security gateway network interfaces, link speeds, duplex modes, and received/transmitted packet performance metrics." },
            { cat: "System Telemetry", cmd: "get system status", desc: "Displays security application engine status, current FortiOS version numbers, cluster HA profile info, and software registration license status." },
            { cat: "Routing & Pathing", cmd: "get router info routing-table all", desc: "Pulls complete system operational kernel table metrics to show active routing entries, next-hop interfaces, and policy metrics." },
            { cat: "VLAN Topology", cmd: "show system interface", desc: "Outputs configuration profiles for all network elements, including virtual sub-interfaces and VLAN tags mapped to physical security zones." },
            { cat: "State Commitment", cmd: "N/A (Auto-saved)", desc: "FortiOS applies configuration adjustments to non-volatile flash storage directly in real time. No manual state execution commit step is required." }
        ],
        paloalto: [
            { cat: "Interface Status", cmd: "show interface all", desc: "Exposes interface hardware speeds, operational statuses, link conditions, and assigned Layer 2/3 security zone interface definitions." },
            { cat: "System Telemetry", cmd: "show system info", desc: "Displays hardware build signatures, PAN-OS release versions, serial numbers, management plane IP parameters, and CPU usage metrics." },
            { cat: "Routing & Pathing", cmd: "show routing route", desc: "Exposes virtual router (VR) operational tables, tracking active next-hops, route paths, static bindings, and dynamic peer configurations." },
            { cat: "VLAN Topology", cmd: "show interface vlan only", desc: "Filters layout profiles to output logical internal VLAN interface tags and security policy mappings across switching instances." },
            { cat: "State Commitment", cmd: "configure\ncommit", desc: "Enters structural configuration mode and executes a policy compilation transaction to move changes from candidate state to live execution context." }
        ],
        hp: [
            { cat: "Interface Status", cmd: "display ip interface brief", desc: "Provides Comware platform layout listing interface protocol states, physical port statuses, link layers, and logical network addresses." },
            { cat: "System Telemetry", cmd: "display version", desc: "Outputs Comware OS platform kernel information, software patch sets, hardware model numbers, and system boot times." },
            { cat: "Routing & Pathing", cmd: "display ip routing-table", desc: "Queries global Layer-3 pathing matrix configurations to expose destination metrics, interface parameters, and structural route preferences." },
            { cat: "VLAN Topology", cmd: "display vlan", desc: "Provides switching domain visibility, showing VLAN descriptions, interface status markers, and operational port allocations." },
            { cat: "State Commitment", cmd: "save force", desc: "Bypasses contextual interactive user prompts to directly write the transient configuration state into structural system startup files." }
        ]
    };

    function switchVendorTab(vendorKey) {
        // Reset tab styling
        const tabs = document.querySelectorAll('#vendorTabs button');
        tabs.forEach(tab => {
            tab.className = "px-3 py-1.5 rounded-lg text-xs font-semibold bg-slate-900 border border-slate-800 text-slate-400 hover:text-slate-200 transition-all cursor-pointer";
        });

        // Highlight selected tab
        document.getElementById(`tab-${vendorKey}`).className = "px-3 py-1.5 rounded-lg text-xs font-semibold bg-blue-600 text-white transition-all cursor-pointer";

        // Inject Table Content
        const tbody = document.getElementById('vendorTableContent');
        tbody.innerHTML = '';

        vendorData[vendorKey].forEach(item => {
            const row = document.createElement('tr');
            row.className = "hover:bg-slate-900/30 transition-colors";
            row.innerHTML = `
                <td class="p-4 font-semibold text-slate-400 flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-slate-700"></span>
                    ${item.cat}
                </td>
                <td class="p-4 font-mono text-indigo-400 font-bold whitespace-pre-wrap">${item.cmd}</td>
                <td class="p-4 text-slate-300 leading-relaxed">${item.desc}</td>
            `;
            tbody.appendChild(row);
        });
    }

    // Initialize with Cisco data on component mount
    window.addEventListener('DOMContentLoaded', () => {
        switchVendorTab('cisco');
    });
</script>
